name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: The placeholder steps below FAIL on purpose until you replace them
# with real commands. A check that always passes without verifying anything
# is worse than no check — combined with branch protection it becomes a
# safety net that catches nothing. Likewise, do not mark this workflow as a
# required status check until the real commands are in place (a skipped
# required check also passes silently).

jobs:
  build-and-test:
